<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexLink — Технические работы</title>
    <style>
        :root {
            --bg-deep: #0a0e17;
            --bg-card: rgba(18, 22, 35, 0.75);
            --accent: #5b8af7;
            --accent-soft: #7ea3ff;
            --accent-glow: rgba(91, 138, 247, 0.4);
            --text-primary: #e8ecf4;
            --text-secondary: #a0abc0;
            --text-muted: #6b7394;
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-glow: rgba(91, 138, 247, 0.25);
            --radius-xl: 28px;
            --radius-lg: 18px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --font-main: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-deep);
            font-family: var(--font-main);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            user-select: none;
            -webkit-user-select: none;
            cursor: default;
        }

        .bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .bg-canvas canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .main-wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 24px;
        }

        .card {
            position: relative;
            width: 100%;
            max-width: 520px;
            background: var(--bg-card);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-xl);
            padding: 48px 40px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow:
                0 30px 80px rgba(0, 0, 0, 0.5),
                0 8px 30px rgba(0, 0, 0, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.03);
            animation: cardEntrance 1s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
            transition:
                border-color 0.6s ease,
                box-shadow 0.6s ease,
                transform 0.5s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        .card:hover {
            border-color: var(--border-glow);
            box-shadow:
                0 35px 90px rgba(0, 0, 0, 0.55),
                0 12px 40px rgba(0, 0, 0, 0.4),
                0 0 70px var(--accent-glow),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
        }

        @keyframes cardEntrance {
            0% {
                opacity: 0;
                transform: translateY(40px) scale(0.94);
                filter: blur(8px);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        .logo-container {
            position: relative;
            width: 76px;
            height: 76px;
            margin-bottom: 28px;
        }

        .logo-icon {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            background: linear-gradient(145deg, #1a2340, #131a2e);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 2;
            border: 1.5px solid rgba(91, 138, 247, 0.3);
            box-shadow:
                0 12px 35px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.04);
            transition: all 0.5s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        .logo-icon svg {
            width: 40px;
            height: 40px;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .card:hover .logo-icon svg {
            transform: scale(1.08);
        }

        .logo-orb {
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            background: radial-gradient(circle,
                    rgba(91, 138, 247, 0.35) 0%,
                    rgba(91, 138, 247, 0.08) 45%,
                    transparent 70%);
            z-index: 1;
            animation: orbPulse 3s ease-in-out infinite;
            pointer-events: none;
        }

        .logo-orb:nth-child(2) {
            animation-delay: 0.8s;
            inset: -18px;
            background: radial-gradient(circle,
                    rgba(126, 163, 255, 0.25) 0%,
                    rgba(126, 163, 255, 0.04) 50%,
                    transparent 72%);
        }

        @keyframes orbPulse {
            0%,
            100% {
                transform: scale(1);
                opacity: 0.7;
            }
            50% {
                transform: scale(1.25);
                opacity: 1;
            }
        }

        .title {
            font-size: 1.7rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            margin-bottom: 8px;
            line-height: 1.2;
            animation: fadeSlideUp 0.8s 0.2s cubic-bezier(0.22, 0.61, 0.36, 1) both;
        }

        .title .highlight {
            background: linear-gradient(135deg, var(--accent-soft), #9db8ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
        }

        @keyframes fadeSlideUp {
            0% {
                opacity: 0;
                transform: translateY(16px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .subtitle {
            font-size: 1rem;
            color: var(--text-secondary);
            font-weight: 400;
            line-height: 1.6;
            margin-bottom: 8px;
            animation: fadeSlideUp 0.8s 0.3s cubic-bezier(0.22, 0.61, 0.36, 1) both;
        }

        .status-row {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
            padding: 8px 18px;
            border-radius: 50px;
            background: rgba(255, 165, 55, 0.08);
            border: 1px solid rgba(255, 165, 55, 0.2);
            animation: fadeSlideUp 0.8s 0.4s cubic-bezier(0.22, 0.61, 0.36, 1) both;
            transition: all 0.5s ease;
        }

        .card:hover .status-row {
            border-color: rgba(255, 165, 55, 0.35);
            background: rgba(255, 165, 55, 0.12);
            box-shadow: 0 0 25px rgba(255, 165, 55, 0.1);
        }

        .status-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #ffa537;
            box-shadow: 0 0 12px rgba(255, 165, 55, 0.7);
            animation: statusGlow 2s ease-in-out infinite;
            flex-shrink: 0;
        }

        @keyframes statusGlow {
            0%,
            100% {
                box-shadow: 0 0 10px rgba(255, 165, 55, 0.5);
            }
            50% {
                box-shadow: 0 0 22px rgba(255, 165, 55, 0.9), 0 0 40px rgba(255, 165, 55, 0.3);
            }
        }

        .status-text {
            font-size: 0.9rem;
            font-weight: 500;
            color: #ffb95c;
            letter-spacing: -0.01em;
        }

        .divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg,
                    transparent,
                    rgba(255, 255, 255, 0.08) 20%,
                    rgba(255, 255, 255, 0.12) 50%,
                    rgba(255, 255, 255, 0.08) 80%,
                    transparent);
            margin-bottom: 28px;
            animation: fadeSlideUp 0.8s 0.5s cubic-bezier(0.22, 0.61, 0.36, 1) both;
        }

        .contact-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 12px;
            font-weight: 500;
            animation: fadeSlideUp 0.8s 0.55s cubic-bezier(0.22, 0.61, 0.36, 1) both;
        }

        .email-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.025);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 14px 18px;
            cursor: pointer;
            transition: all 0.45s cubic-bezier(0.25, 0.1, 0.25, 1);
            animation: fadeSlideUp 0.8s 0.6s cubic-bezier(0.22, 0.61, 0.36, 1) both;
            width: 100%;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .email-wrapper::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--radius-lg);
            background: linear-gradient(135deg,
                    rgba(91, 138, 247, 0.08) 0%,
                    rgba(126, 163, 255, 0.03) 50%,
                    transparent 100%);
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 0;
        }

        .email-wrapper:hover {
            border-color: rgba(91, 138, 247, 0.4);
            background: rgba(255, 255, 255, 0.04);
            box-shadow:
                0 8px 30px rgba(0, 0, 0, 0.3),
                0 0 30px rgba(91, 138, 247, 0.1);
            transform: translateY(-1px);
        }

        .email-wrapper:hover::before {
            opacity: 1;
        }

        .email-wrapper:active {
            transform: scale(0.975);
            transition: transform 0.15s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        .email-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            color: var(--accent-soft);
            z-index: 1;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .email-wrapper:hover .email-icon {
            transform: translateY(-2px) scale(1.1);
        }

        .email-address {
            font-family: var(--font-mono);
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-primary);
            letter-spacing: -0.01em;
            z-index: 1;
            transition: color 0.4s ease;
            word-break: break-all;
        }

        .email-wrapper:hover .email-address {
            color: #c5d4ff;
        }

        .copy-hint {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.75rem;
            color: var(--text-muted);
            opacity: 0;
            transition: all 0.4s ease;
            z-index: 1;
            pointer-events: none;
            white-space: nowrap;
        }

        .email-wrapper:hover .copy-hint {
            opacity: 1;
            right: 20px;
        }

        /* Кнопки действий */
        .action-buttons {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-top: 14px;
            width: 100%;
        }

        .copy-btn,
        .refresh-btn {
            font-size: 0.82rem;
            font-weight: 500;
            border-radius: 50px;
            padding: 9px 22px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
            animation: fadeSlideUp 0.8s 0.7s cubic-bezier(0.22, 0.61, 0.36, 1) both;
            font-family: var(--font-main);
            letter-spacing: 0.01em;
            position: relative;
            overflow: hidden;
            background: transparent;
            border: 1px solid;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: auto;
            min-width: 180px;
        }

        .copy-btn {
            color: var(--accent-soft);
            border-color: rgba(91, 138, 247, 0.2);
        }

        .refresh-btn {
            color: var(--text-secondary);
            border-color: rgba(255, 255, 255, 0.12);
            animation-delay: 0.8s;
        }

        .copy-btn::before,
        .refresh-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50px;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .copy-btn::before {
            background: linear-gradient(135deg, rgba(91, 138, 247, 0.15), rgba(126, 163, 255, 0.05));
        }

        .refresh-btn::before {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02));
        }

        .copy-btn:hover {
            border-color: rgba(91, 138, 247, 0.5);
            color: #c5d4ff;
            box-shadow: 0 6px 25px rgba(91, 138, 247, 0.2);
            transform: translateY(-1px);
        }

        .refresh-btn:hover {
            border-color: rgba(255, 255, 255, 0.3);
            color: #ffffff;
            box-shadow: 0 6px 25px rgba(255, 255, 255, 0.08);
            transform: translateY(-1px);
        }

        .copy-btn:hover::before,
        .refresh-btn:hover::before {
            opacity: 1;
        }

        .copy-btn:active,
        .refresh-btn:active {
            transform: scale(0.95);
            transition: transform 0.12s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        .copy-btn.copied {
            border-color: rgba(80, 220, 140, 0.5) !important;
            color: #6ee7b7 !important;
            background: rgba(80, 220, 140, 0.08) !important;
            box-shadow: 0 0 25px rgba(80, 220, 140, 0.25) !important;
            transition: all 0.3s ease;
        }

        .footer-note {
            margin-top: 24px;
            font-size: 0.78rem;
            color: var(--text-muted);
            letter-spacing: 0.02em;
            animation: fadeSlideUp 0.8s 0.9s cubic-bezier(0.22, 0.61, 0.36, 1) both;
            transition: color 0.5s ease;
        }

        .card:hover .footer-note {
            color: #8b95b5;
        }

        .toast {
            position: fixed;
            bottom: 36px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(30, 36, 52, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(80, 220, 140, 0.3);
            border-radius: 50px;
            padding: 12px 26px;
            color: #6ee7b7;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.01em;
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.22, 0.61, 0.36, 1);
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.5), 0 0 30px rgba(80, 220, 140, 0.15);
            white-space: nowrap;
        }

        .toast.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 560px) {
            .card {
                padding: 36px 22px 32px;
                border-radius: var(--radius-lg);
            }
            .title {
                font-size: 1.4rem;
            }
            .subtitle {
                font-size: 0.9rem;
            }
            .email-address {
                font-size: 0.8rem;
            }
            .email-wrapper {
                padding: 12px 14px;
                gap: 8px;
            }
            .copy-hint {
                display: none;
            }
            .logo-container {
                width: 60px;
                height: 60px;
                margin-bottom: 22px;
            }
            .logo-icon svg {
                width: 30px;
                height: 30px;
            }
            .action-buttons {
                gap: 10px;
            }
            .copy-btn,
            .refresh-btn {
                min-width: 160px;
                font-size: 0.78rem;
                padding: 8px 18px;
            }
        }

        @media (max-width: 380px) {
            .card {
                padding: 28px 14px 24px;
            }
            .title {
                font-size: 1.2rem;
            }
            .email-address {
                font-size: 0.7rem;
            }
            .status-row {
                padding: 6px 14px;
                gap: 7px;
            }
            .status-text {
                font-size: 0.78rem;
            }
        }
    </style>
</head>
<body>

    <div class="bg-canvas" id="bgCanvas">
        <canvas id="particlesCanvas"></canvas>
    </div>

    <div class="main-wrapper">
        <div class="card" id="mainCard">
            <!-- Логотип -->
            <div class="logo-container">
                <div class="logo-orb"></div>
                <div class="logo-orb"></div>
                <div class="logo-icon">
                    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20 4L36 12V28L20 36L4 28V12L20 4Z"
                        stroke="url(#logoGrad)"
                        stroke-width="2.2"
                        stroke-linejoin="round"
                        fill="none" />
                        <path d="M20 14L28 18V26L20 30L12 26V18L20 14Z"
                        fill="url(#logoGradInner)"
                        opacity="0.85" />
                        <circle cx="20" cy="20" r="2.8" fill="#c5d4ff" opacity="0.9">
                            <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite" />
                        </circle>
                        <defs>
                            <linearGradient id="logoGrad" x1="4" y1="4" x2="36" y2="36"
                            gradientUnits="userSpaceOnUse">
                            <stop stop-color="#7ea3ff" />
                            <stop offset="1" stop-color="#5b8af7" />
                        </linearGradient>
                        <linearGradient id="logoGradInner" x1="12" y1="14" x2="28" y2="30"
                        gradientUnits="userSpaceOnUse">
                        <stop stop-color="#7ea3ff" stop-opacity="0.7" />
                        <stop offset="1" stop-color="#5b8af7" stop-opacity="0.5" />
                    </linearGradient>
                </defs>
            </svg>
        </div>
    </div>

    <h1 class="title">
        <span class="highlight">NexLink</span> на обслуживании
    </h1>
    <p class="subtitle">
        Мы проводим плановые технические работы,<br>чтобы сделать мессенджер ещё быстрее и надёжнее.
    </p>

    <div class="status-row">
        <span class="status-dot"></span>
        <span class="status-text">Ведутся работы</span>
    </div>

    <div class="divider"></div>

    <p class="contact-label">Связь с командой</p>
    <div class="email-wrapper" id="emailBlock" title="Нажмите, чтобы скопировать">
        <svg class="email-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="4" width="20" height="16" rx="2" />
        <path d="M22 4L12 13L2 4" />
    </svg>
    <span class="email-address">nexlinkofficial8@gmail.com</span>
    <span class="copy-hint">Копировать</span>
</div>

<div class="action-buttons">
    <button class="copy-btn" id="copyBtn">
        📋 Скопировать адрес
    </button>
    <button class="refresh-btn" id="refreshBtn">
        🔄 Обновить страницу
    </button>
</div>

<p class="footer-note">Спасибо за понимание 💙</p>
</div>
</div>

<div class="toast" id="toast">✓ Адрес скопирован</div>

<script>
    (function() {
        // ============ ЧАСТИЦЫ ============
        const canvas = document.getElementById('particlesCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let animationId;
        let mouseX = -1000;
        let mouseY = -1000;
        let targetMouseX = -1000;
        let targetMouseY = -1000;

        function resizeCanvas() {
            const dpr = Math.min(window.devicePixelRatio || 1, 2);
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.scale(dpr, dpr);
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
        }

        function createParticles() {
            const w = canvas.parentElement.getBoundingClientRect().width;
            const h = canvas.parentElement.getBoundingClientRect().height;
            const count = Math.floor((w * h) / 14000);
            particles = [];
            for (let i = 0; i < Math.min(count, 80); i++) {
                particles.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    vx: (Math.random() - 0.5) * 0.35,
                    vy: (Math.random() - 0.5) * 0.35,
                    r: Math.random() * 2.2 + 0.8,
                    baseAlpha: Math.random() * 0.35 + 0.15,
                    alpha: 0,
                    targetAlpha: Math.random() * 0.35 + 0.15,
                    pulseSpeed: Math.random() * 0.015 + 0.005,
                    pulseOffset: Math.random() * Math.PI * 2,
                });
            }
        }

        function drawParticles(time) {
            const w = canvas.parentElement.getBoundingClientRect().width;
            const h = canvas.parentElement.getBoundingClientRect().height;
            ctx.clearRect(0, 0, w, h);

            mouseX += (targetMouseX - mouseX) * 0.06;
            mouseY += (targetMouseY - mouseY) * 0.06;

            for (let p of particles) {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < -20) p.x = w + 20;
                if (p.x > w + 20) p.x = -20;
                if (p.y < -20) p.y = h + 20;
                if (p.y > h + 20) p.y = -20;

                p.targetAlpha = p.baseAlpha + Math.sin(time * p.pulseSpeed + p.pulseOffset) * 0.12;
                p.alpha += (p.targetAlpha - p.alpha) * 0.04;

                let dx = p.x - mouseX;
                let dy = p.y - mouseY;
                let dist = Math.sqrt(dx * dx + dy * dy);
                let glowAlpha = 0;
                if (dist < 180) {
                    glowAlpha = (1 - dist / 180) * 0.5;
                }

                let finalAlpha = Math.max(0, Math.min(1, p.alpha + glowAlpha));
                let size = p.r + (dist < 180 ? (1 - dist / 180) * 1.8 : 0);

                ctx.beginPath();
                ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(150,180,230,${finalAlpha})`;
                ctx.fill();

                if (glowAlpha > 0.02) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, size * 2.5, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(120,155,220,${glowAlpha * 0.4})`;
                    ctx.fill();
                }

                for (let j = particles.indexOf(p) + 1; j < particles.length; j++) {
                    let p2 = particles[j];
                    let dx2 = p.x - p2.x;
                    let dy2 = p.y - p2.y;
                    let dist2 = Math.sqrt(dx2 * dx2 + dy2 * dy2);
                    if (dist2 < 100) {
                        let lineAlpha = (1 - dist2 / 100) * 0.12 * Math.min(p.alpha, p2.alpha);
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.strokeStyle = `rgba(150,185,235,${lineAlpha})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
        }

        function animate(timestamp) {
            drawParticles(timestamp);
            animationId = requestAnimationFrame(animate);
        }

        function handleMouseMove(e) {
            const rect = canvas.parentElement.getBoundingClientRect();
            targetMouseX = e.clientX - rect.left;
            targetMouseY = e.clientY - rect.top;
        }

        function handleMouseLeave() {
            targetMouseX = -1000;
            targetMouseY = -1000;
        }

        function handleTouchMove(e) {
            if (e.touches.length > 0) {
                const rect = canvas.parentElement.getBoundingClientRect();
                targetMouseX = e.touches[0].clientX - rect.left;
                targetMouseY = e.touches[0].clientY - rect.top;
            }
        }

        function handleTouchEnd() {
            targetMouseX = -1000;
            targetMouseY = -1000;
        }

        function initParticles() {
            resizeCanvas();
            createParticles();
            if (animationId) cancelAnimationFrame(animationId);
            animationId = requestAnimationFrame(animate);
        }

        // ============ КОПИРОВАНИЕ ============
        const emailBlock = document.getElementById('emailBlock');
        const copyBtn = document.getElementById('copyBtn');
        const toast = document.getElementById('toast');
        const emailAddress = 'nexlinkofficial8@gmail.com';
        let toastTimeout;

        function showToast() {
            if (toastTimeout) clearTimeout(toastTimeout);
            toast.classList.add('visible');
            toastTimeout = setTimeout(() => {
                toast.classList.remove('visible');
            }, 2200);
        }

        function copyEmail() {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(emailAddress).then(() => {
                    showToast();
                    pulseCopyBtn();
                }).catch(() => {
                    fallbackCopy();
                });
            } else {
                fallbackCopy();
            }
        }

        function fallbackCopy() {
            const textarea = document.createElement('textarea');
            textarea.value = emailAddress;
            textarea.style.position = 'fixed';
            textarea.style.left = '-9999px';
            textarea.style.top = '-9999px';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.focus();
            textarea.select();
            try {
                document.execCommand('copy');
                showToast();
                pulseCopyBtn();
            } catch (err) { }
            document.body.removeChild(textarea);
        }

        function pulseCopyBtn() {
            copyBtn.classList.add('copied');
            setTimeout(() => {
                copyBtn.classList.remove('copied');
            }, 1800);
        }

        emailBlock.addEventListener('click', copyEmail);
        copyBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            copyEmail();
        });

        // ============ ОБНОВЛЕНИЕ СТРАНИЦЫ ============
        const refreshBtn = document.getElementById('refreshBtn');
        refreshBtn.addEventListener('click', () => {
            // Плавная реакция перед перезагрузкой
            refreshBtn.style.transform = 'scale(0.95)';
            setTimeout(() => {
                location.reload();
            }, 150);
        });

        // ============ СТАРТ ============
        document.addEventListener('DOMContentLoaded', () => {
            initParticles();
            document.addEventListener('mousemove', handleMouseMove, { passive: true });
            document.addEventListener('mouseleave', handleMouseLeave);
            document.addEventListener('touchmove', handleTouchMove, { passive: true });
            document.addEventListener('touchend', handleTouchEnd);
        });

        window.addEventListener('resize', () => {
            resizeCanvas();
            createParticles();
        });

        window.addEventListener('beforeunload', () => {
            if (animationId) cancelAnimationFrame(animationId);
        });
    })();
</script>
</body>
</html>
