<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Технические работы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e1a;
            color: #f0f4ff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 20px;
            position: relative;
        }
        /* Анимированный фон (размытые круги) */
        .bg-circles {
            position: absolute;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }
        .bg-circles div {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            animation: float 20s ease-in-out infinite alternate;
        }
        .bg-circles .c1 {
            width: 40vw;
            height: 40vw;
            background: rgba(167, 139, 250, 0.2);
            top: -10%;
            left: -10%;
        }
        .bg-circles .c2 {
            width: 50vw;
            height: 50vw;
            background: rgba(96, 165, 250, 0.2);
            bottom: -10%;
            right: -10%;
            animation-delay: -5s;
        }
        .bg-circles .c3 {
            width: 30vw;
            height: 30vw;
            background: rgba(236, 72, 153, 0.15);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
        }
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, -30px) scale(1.1); }
        }

        /* Контент */
        .content {
            position: relative;
            z-index: 1;
        }
        .icon {
            font-size: 80px;
            margin-bottom: 20px;
            display: inline-block;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        h1 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 18px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 8px;
            line-height: 1.6;
        }
        .sub {
            font-size: 15px;
            color: rgba(255,255,255,0.5);
            margin-top: 4px;
        }
        .progress-wrap {
            margin: 30px auto 20px;
            width: 80%;
            max-width: 300px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #a78bfa, #60a5fa);
            border-radius: 4px;
            animation: progress 3s ease-in-out infinite;
        }
        @keyframes progress {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 0%; }
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 32px;
            border-radius: 40px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            color: #f0f4ff;
            text-decoration: none;
            font-weight: 500;
            transition: 0.2s;
            cursor: default;
        }
        .btn:hover {
            background: rgba(255,255,255,0.1);
        }

        /* Ссылка на соцсети */
        .social {
            margin-top: 24px;
            display: flex;
            gap: 16px;
            justify-content: center;
        }
        .social a {
            color: rgba(255,255,255,0.4);
            text-decoration: none;
            font-size: 20px;
            transition: 0.2s;
        }
        .social a:hover {
            color: #fff;
            transform: scale(1.1);
        }

        @media (max-width: 480px) {
            h1 { font-size: 28px; }
            .icon { font-size: 60px; }
            p { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="bg-circles">
            <div class="c1"></div>
            <div class="c2"></div>
            <div class="c3"></div>
        </div>
        <div class="content">
            <div class="icon">🔧</div>
            <h1>Технические работы</h1>
            <p>Мы обновляем сервисы, чтобы сделать NexLink ещё лучше.</p>
            <p style="font-size:15px; color:rgba(255,255,255,0.5);">Ориентировочное время восстановления — несколько часов.</p>
            <div class="progress-wrap">
                <div class="progress-fill"></div>
            </div>
            <div class="btn">⏳ Идёт обновление</div>
            <div class="social">
                <a href="#" title="Twitter">🐦</a>
                <a href="#" title="Telegram">✈️</a>
                <a href="#" title="VK">📱</a>
            </div>
            <div class="sub" style="margin-top:16px;">
                Приносим извинения за временные неудобства. <br>Следите за новостями в наших соцсетях.
            </div>
        </div>
    </div>
</body>
</html>
