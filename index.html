<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Технические работы — NexLink</title>
    <style>
        /* ================================================
           RESET & BASE
        ================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0a0a14;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ================================================
           АНИМИРОВАННЫЙ ФОН
        ================================================ */
        .maintenance-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .maintenance-bg .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: floatOrb 20s ease-in-out infinite alternate;
        }

        .maintenance-bg .orb:nth-child(1) {
            width: 600px;
            height: 600px;
            top: -200px;
            left: -200px;
            background: #2AABEE;
            animation-duration: 25s;
        }

        .maintenance-bg .orb:nth-child(2) {
            width: 500px;
            height: 500px;
            bottom: -150px;
            right: -150px;
            background: #6C63FF;
            animation-duration: 30s;
            animation-delay: -5s;
        }

        .maintenance-bg .orb:nth-child(3) {
            width: 400px;
            height: 400px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #FF6B6B;
            animation-duration: 35s;
            animation-delay: -10s;
            opacity: 0.15;
        }

        @keyframes floatOrb {
            0% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(30px, -50px) scale(1.1);
            }
            66% {
                transform: translate(-20px, 30px) scale(0.9);
            }
            100% {
                transform: translate(40px, -20px) scale(1.05);
            }
        }

        /* ================================================
           ОСНОВНОЙ КОНТЕЙНЕР
        ================================================ */
        .maintenance-container {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 600px;
            padding: 40px 30px;
            animation: fadeInUp 0.8s ease both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ================================================
           КАРТОЧКА С ТЕКСТУРОЙ
        ================================================ */
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 40px;
            padding: 50px 40px 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
        }

        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, rgba(42, 171, 238, 0.05) 0%, transparent 60%);
            pointer-events: none;
        }

        /* ================================================
           ЛОГОТИП
        ================================================ */
        .maintenance-logo {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #2AABEE, #6C63FF);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin: 0 auto 24px;
            box-shadow: 0 20px 60px rgba(42, 171, 238, 0.3);
            animation: pulseLogo 3s ease-in-out infinite;
            position: relative;
            z-index: 1;
        }

        @keyframes pulseLogo {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 20px 60px rgba(42, 171, 238, 0.3);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 30px 80px rgba(42, 171, 238, 0.5);
            }
        }

        /* ================================================
           ЗАГОЛОВКИ
        ================================================ */
        .maintenance-title {
            font-size: 38px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 30%, #2AABEE 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
            position: relative;
            z-index: 1;
        }

        .maintenance-subtitle {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 6px;
            font-weight: 400;
            position: relative;
            z-index: 1;
        }

        /* ================================================
           ИКОНКА ШЕСТЕРЁНКИ
        ================================================ */
        .gear-wrapper {
            display: inline-block;
            position: relative;
            margin-bottom: 16px;
        }

        .gear-icon {
            display: inline-block;
            font-size: 72px;
            animation: spinGear 8s linear infinite;
            filter: drop-shadow(0 0 40px rgba(42, 171, 238, 0.2));
        }

        @keyframes spinGear {
            from {
                transform: rotate(0deg) scale(1);
            }
            50% {
                transform: rotate(180deg) scale(1.05);
            }
            to {
                transform: rotate(360deg) scale(1);
            }
        }

        /* ================================================
           ПУЛЬСИРУЮЩИЕ КРУГИ ВОКРУГ ШЕСТЕРЁНКИ
        ================================================ */
        .pulse-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 2px solid rgba(42, 171, 238, 0.15);
            animation: pulseRing 2.5s ease-out infinite;
        }

        .pulse-ring:nth-child(2) {
            animation-delay: 0.8s;
            width: 150px;
            height: 150px;
            border-color: rgba(108, 99, 255, 0.1);
        }

        .pulse-ring:nth-child(3) {
            animation-delay: 1.6s;
            width: 180px;
            height: 180px;
            border-color: rgba(255, 107, 107, 0.08);
        }

        @keyframes pulseRing {
            0% {
                transform: translate(-50%, -50%) scale(0.8);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1.8);
                opacity: 0;
            }
        }

        /* ================================================
           СООБЩЕНИЕ
        ================================================ */
        .maintenance-message {
            font-size: 16px;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.75);
            margin: 16px 0 28px;
            padding: 0 10px;
            position: relative;
            z-index: 1;
        }

        .maintenance-message strong {
            color: #ffffff;
            font-weight: 600;
        }

        /* ================================================
           СТАТУС
        ================================================ */
        .status-text {
            display: inline-flex;
            align-items: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 20px;
            padding: 8px 20px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.04);
            position: relative;
            z-index: 1;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #FF6B6B;
            margin-right: 10px;
            animation: blinkDot 1.5s ease-in-out infinite;
        }

        @keyframes blinkDot {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.2;
                transform: scale(0.7);
            }
        }

        /* ================================================
           ССЫЛКИ
        ================================================ */
        .links {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 4px 0 12px;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }

        .links a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 10px 20px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .links a:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        .links a .link-icon {
            font-size: 18px;
        }

        .links a.github:hover {
            border-color: rgba(42, 171, 238, 0.3);
            box-shadow: 0 8px 25px rgba(42, 171, 238, 0.1);
        }

        .links a.vk:hover {
            border-color: rgba(108, 99, 255, 0.3);
            box-shadow: 0 8px 25px rgba(108, 99, 255, 0.1);
        }

        /* ================================================
           КОНТАКТЫ
        ================================================ */
        .maintenance-contact {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.35);
            margin-top: 8px;
            position: relative;
            z-index: 1;
        }

        .maintenance-contact a {
            color: rgba(42, 171, 238, 0.7);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .maintenance-contact a:hover {
            color: #2AABEE;
        }

        /* ================================================
           ДЕКОРАТИВНАЯ ЛИНИЯ
        ================================================ */
        .divider {
            width: 40px;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            margin: 16px auto 20px;
            border-radius: 2px;
            position: relative;
            z-index: 1;
        }

        /* ================================================
           ВЕРСИЯ
        ================================================ */
        .version {
            position: fixed;
            bottom: 24px;
            right: 28px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.12);
            z-index: 1;
            letter-spacing: 0.5px;
            font-weight: 300;
        }

        /* ================================================
           АДАПТИВНОСТЬ
        ================================================ */
        @media (max-width: 500px) {
            .card {
                padding: 32px 20px 28px;
                border-radius: 28px;
            }

            .maintenance-title {
                font-size: 28px;
            }

            .maintenance-logo {
                width: 76px;
                height: 76px;
                font-size: 36px;
                border-radius: 22px;
            }

            .gear-icon {
                font-size: 48px;
            }

            .gear-wrapper {
                margin-bottom: 10px;
            }

            .pulse-ring {
                width: 90px;
                height: 90px;
            }
            .pulse-ring:nth-child(2) {
                width: 110px;
                height: 110px;
            }
            .pulse-ring:nth-child(3) {
                width: 130px;
                height: 130px;
            }

            .maintenance-message {
                font-size: 15px;
                padding: 0;
                margin: 12px 0 20px;
            }

            .links a {
                font-size: 13px;
                padding: 8px 14px;
            }

            .status-text {
                font-size: 13px;
                padding: 6px 16px;
            }

            .version {
                bottom: 16px;
                right: 20px;
                font-size: 10px;
            }
        }

        @media (max-width: 380px) {
            .card {
                padding: 24px 16px 20px;
                border-radius: 24px;
            }

            .maintenance-title {
                font-size: 22px;
            }

            .maintenance-logo {
                width: 60px;
                height: 60px;
                font-size: 28px;
                border-radius: 18px;
                margin-bottom: 16px;
            }

            .gear-icon {
                font-size: 36px;
            }

            .maintenance-message {
                font-size: 13px;
            }

            .links {
                gap: 8px;
            }

            .links a {
                font-size: 12px;
                padding: 6px 12px;
                gap: 4px;
            }

            .links a .link-icon {
                font-size: 14px;
            }

            .maintenance-contact {
                font-size: 12px;
            }

            .divider {
                width: 30px;
                margin: 12px auto 16px;
            }
        }

        /* ================================================
           ТЁМНАЯ ТЕМА С ПОДДЕРЖКОЙ PREFERS-COLOR-SCHEME
        ================================================ */
        @media (prefers-color-scheme: light) {
            body {
                background: #eef1f5;
            }

            .maintenance-bg .orb {
                opacity: 0.12;
            }

            .card {
                background: rgba(255, 255, 255, 0.7);
                backdrop-filter: blur(40px);
                -webkit-backdrop-filter: blur(40px);
                border-color: rgba(255, 255, 255, 0.3);
                box-shadow: 0 30px 80px rgba(0, 0, 0, 0.08);
            }

            .card::before {
                background: radial-gradient(circle at 30% 20%, rgba(42, 171, 238, 0.04) 0%, transparent 60%);
            }

            .maintenance-title {
                -webkit-text-fill-color: #1a1a2e;
                background: none;
                color: #1a1a2e;
            }

            .maintenance-subtitle {
                color: rgba(26, 26, 46, 0.6);
            }

            .maintenance-message {
                color: rgba(26, 26, 46, 0.7);
            }

            .maintenance-message strong {
                color: #1a1a2e;
            }

            .status-text {
                color: rgba(26, 26, 46, 0.4);
                background: rgba(0, 0, 0, 0.03);
                border-color: rgba(0, 0, 0, 0.04);
            }

            .links a {
                color: rgba(26, 26, 46, 0.5);
                background: rgba(0, 0, 0, 0.03);
                border-color: rgba(0, 0, 0, 0.04);
            }

            .links a:hover {
                color: #1a1a2e;
                background: rgba(0, 0, 0, 0.06);
                border-color: rgba(0, 0, 0, 0.08);
            }

            .maintenance-contact {
                color: rgba(26, 26, 46, 0.3);
            }

            .maintenance-contact a {
                color: rgba(42, 171, 238, 0.7);
            }

            .maintenance-contact a:hover {
                color: #2AABEE;
            }

            .divider {
                background: linear-gradient(90deg, transparent, rgba(0, 0, 0, 0.08), transparent);
            }

            .version {
                color: rgba(26, 26, 46, 0.12);
            }

            .gear-icon {
                filter: drop-shadow(0 0 30px rgba(42, 171, 238, 0.1));
            }
        }
    </style>
</head>
<body>

    <!-- ==============================================
    АНИМИРОВАННЫЙ ФОН
    ============================================== -->
    <div class="maintenance-bg">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>

    <!-- ==============================================
    ОСНОВНОЙ БЛОК
    ============================================== -->
    <div class="maintenance-container">

        <div class="card">

            <!-- Шестерёнка с пульсирующими кольцами -->
            <div class="gear-wrapper">
                <div class="pulse-ring"></div>
                <div class="pulse-ring"></div>
                <div class="pulse-ring"></div>
                <div class="gear-icon">⚙️</div>
            </div>

            <!-- Логотип -->
            <div class="maintenance-logo">💬</div>

            <!-- Заголовок -->
            <h1 class="maintenance-title">Технические работы</h1>

            <!-- Подзаголовок -->
            <p class="maintenance-subtitle">Мы обновляем NexLink, чтобы сделать его ещё лучше</p>

            <!-- Сообщение -->
            <div class="maintenance-message">
                <p>⚡ Сервис временно недоступен. Мы работаем над обновлениями и улучшениями.</p>
                <p style="margin-top:6px;">Приносим извинения за неудобства — мы <strong>скоро вернёмся</strong>!</p>
            </div>

            <!-- Декоративная линия -->
            <div class="divider"></div>

            <!-- Статус -->
            <div class="status-text">
                <span class="status-dot"></span>
                Обновление в процессе
            </div>

            <!-- Ссылки -->
            <div class="links">
                <a href="https://github.com/fatimamuslimova468-dotcom/nexlinkchat" target="_blank" class="github">
                    <span class="link-icon">🐙</span> GitHub
                </a>
                <a href="https://vk.com/club240075322" target="_blank" class="vk">
                    <span class="link-icon">📱</span> VK
                </a>
            </div>

            <!-- Контакты -->
            <div class="maintenance-contact">
                📧 По вопросам: <a href="mailto:nexlinkofficial8@gmail.com">nexlinkofficial8@gmail.com</a>
            </div>

        </div>

    </div>

    <!-- Версия -->
    <div class="version">NexLink v10.0</div>

</body>
</html>
